<script>
  // Map github.io/UWC-Survival-Guide/<path> -> uwc-survival-guide.pages.dev/<path>
  // so deep links redirect too (strip the project-page base, keep query + hash).
  (function () {
    var base = "/UWC-Survival-Guide";
    var path = location.pathname.indexOf(base) === 0
      ? location.pathname.slice(base.length)
      : location.pathname;
    if (path === "" ) path = "/";
    location.replace("https://uwc-survival-guide.pages.dev" + path + location.search + location.hash);
  })();
</script>
