name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Tests (run before building) ──

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Node modules (functions)
        uses: actions/cache@v4
        with:
          path: functions/node_modules
          key: node-functions-${{ hashFiles('functions/package-lock.json', 'functions/package.json') }}
          restore-keys: node-functions-

      - name: Cache Node modules (tests)
        uses: actions/cache@v4
        with:
          path: tests/node_modules
          key: node-tests-${{ hashFiles('tests/package-lock.json', 'tests/package.json') }}
          restore-keys: node-tests-

      - name: Install test dependencies
        run: |
          cd functions && npm install &
          cd tests && npm install &
          wait

      - name: Run Cloud Functions tests
        run: npx jest --verbose
        working-directory: functions

      - name: Run site validation tests
        run: npx jest --verbose
        working-directory: tests

      # ── Build ──

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: website

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl /UWC-Survival-Guide
        working-directory: website
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
