about:
  hero_label: 關於計畫
  hero_title: UWC 常熟生存指南
  hero_subtitle: 對本計畫、編輯宗旨以及參與學生的正式介紹。
  overview_label: 計畫概覽
  overview_title: 為 UWC 常熟社群持續維護的學生編輯資源
  overview_desc: 本指南希望把學生之間容易隨屆流失的實用經驗沉澱下來，讓後來的同學繼續補充與改進。
  introduction:
    - UWC 常熟生存指南是一份由學生維護的知識庫，服務於即將入學與正在就讀的同學。
    - 它的目標是保存那些最容易在一屆又一屆之間散失的實務經驗：如何安頓下來，如何適應學業體系，以及如何更好地利用校園和周邊的機會。
    - 這個計畫被當作一份持續更新的出版物來維護。主編負責方向與標準，貢獻者則持續撰寫、修訂、翻譯並實質性完善各篇文章。
  principles:
    - title: 學生共建
      description: 這份指南建立在真實的學生經驗之上，關注的是在實際生活裡真正有用的資訊，而不只是正式文件上的內容。
    - title: 編輯維護
      description: 我們把它當作一份長期更新的出版物來對待，擁有明確署名、清晰標準，以及隨著學校環境變化持續修訂的空間。
    - title: 超越一屆
      description: 倉庫把學校的集體記憶集中保存下來，讓每一屆畢業生都能把更有用的經驗交給下一屆，而不是留下零散建議。
  recognition_label: 署名規則
  recognition_title: 貢獻者如何被標註
  recognition_desc: 主編單獨列出。核心貢獻者指對五篇或以上不同文章做出實質性貢獻的成員。其他所有撰寫、編輯、翻譯或實質性改進已發布內容的人都會列為貢獻者。
  cfa_label: 徵稿啟事
  cfa_title: 我們正在尋找貢獻者
  cfa_desc: 生存指南的價值取決於貢獻者願意分享的知識。如果你是 UWC 常熟的在讀或往屆學生，並有值得留存的實用建議，我們邀請你為本指南撰稿。
  cfa_portal_btn: 前往貢獻者門戶
  cfa_learn_more: 了解詳情並投稿
  leadership_label: 計畫團隊
  leadership_title: 主編
  leadership_desc: 主編負責計畫的編輯方向，並維護已發布指南的整體標準。
  editor_in_chief_label: 主編
  core_label: 貢獻者
  core_title: 核心貢獻者
  core_desc: 核心貢獻者指對五篇或以上不同文章做出實質性貢獻的成員。
  core_contributor_label: 核心貢獻者
  core_empty: 隨著計畫發展，新的核心貢獻者會列在這裡。
  contributors_label: 貢獻者
  contributor_label: 貢獻者
  contributors_title: 其他貢獻者
  contributors_desc: 本部分記錄所有對已發布內容做出實質性改進且未被列為主編的成員。
  contributors_empty: 新的貢獻者與修訂紀錄會在後續發布中加入這裡。
cfa_page:
  hero_label: 徵稿啟事
  hero_title: 為生存指南撰稿
  hero_subtitle: 投稿指南——我們發布什麼、如何提交以及編輯流程。
  overview_label: 概述
  overview_title: 我們在尋找什麼
  overview_desc: 生存指南的價值取決於貢獻者願意分享的知識。如果你是 UWC 常熟的在讀或往屆學生，並有值得留存的實用建議，我們邀請你為本指南撰稿。
  guidelines_label: 準則
  guidelines_title: 投稿準則
  guidelines_desc: 撰寫文章時請注意以下幾點。
  guidelines:
    - title: 只要有幫助就行
      description: 標準很簡單——只要對 UWC 常熟的同學有幫助，就適合發在這裡。實用指南、個人故事、心得感悟、小貼士——任何形式都歡迎，只要別人能從中學到東西。
    - title: 要有實質性貢獻
      description: 每篇文章應當貢獻全新的內容，不接受對已有文章的增量補充——如果你想改進現有文章，請聯繫主編。但是，對已發布文章提出有理有據的反駁或不同觀點非常歡迎。
    - title: 一篇一題
      description: 每篇文章應聚焦一個明確的主題。如果你發現自己在寫多個話題，請考慮拆分為多篇文章。
    - title: 支援多種語言
      description: 你可以用英文、簡體中文或繁體中文撰寫。任何支援語言的文章都同樣歡迎。
  portal_btn: 前往貢獻者門戶
  updated_label: 更新於：
content_rights:
  label: 內容版權
  title: 程式碼與內容分別授權
  desc: 網站原始碼以 MIT 協議開源；原創指南文字、貢獻者照片和其他媒體素材則不在此範圍內。
  paragraphs:
    - 除非另有說明，本站發布的原創指南文字、編輯內容、貢獻者肖像、頭像照片、攝影作品及其他媒體素材的版權均歸各自作者和貢獻者所有，並保留所有權利。
    - 貢獻者肖像和頭像照片僅用於本計畫內的身分識別。未經相關權利人及在適用情況下被攝者本人事先書面許可，不得複製、轉載、編輯、再發布或用於暗示其認可。
    - 除非適用法律另有獨立允許，未經相關著作權持有人事先書面許可，不得複製、轉載、改編、翻譯或再發布這些內容。
    - 用於建置本站的原始碼與設定檔在倉庫中以 MIT 授權另行授權。
