about:
  hero_label: About
  hero_title: UWC Changshu China Survival Guide
  hero_subtitle: A formal introduction to the project, its editorial mission, and the students who build it.
  overview_label: Project Overview
  overview_title: A student-edited, long-maintained guide to UWC Changshu
  overview_desc: The guide collects the practical experience students build up over time, so each new cohort can add to it.
  introduction:
    - The UWC Changshu China Survival Guide is a student-maintained knowledge base for incoming and current students at UWC Changshu China.
    - "It preserves the kind of practical knowledge that tends to get lost between cohorts: how to settle in, how to handle the academics, and how to make use of what's around campus."
    - The project is maintained as a long-running publication. Editors set direction and review submissions; contributors write and revise articles.
  principles:
    - title: Student-built
      description: Content comes from students' own experience and focuses on what's actually useful day-to-day, not just what shows up in official documents.
    - title: Editorially maintained
      description: Editors handle direction and review. Every article is signed, and the text gets updated as things at school change.
    - title: Built to outlast a cohort
      description: Each cohort's experience accumulates in one place, so the next group doesn't have to start from scratch.
  recognition_label: Recognition Policy
  recognition_title: How contributors are credited
  recognition_desc: Editors-in-Chief are listed separately. Core contributors are those who have materially contributed to five or more distinct articles. Anyone else who has written, edited, or materially improved published content is listed as a contributor.
  leadership_label: Leadership
  leadership_title: Editors-in-Chief
  leadership_desc: The Editors-in-Chief set the editorial direction of the project and maintain the standard of published articles.
  editor_in_chief_label: Editor-in-Chief
  core_label: Contributors
  core_title: Core Contributors
  core_desc: Core contributors are those who have materially contributed to five or more distinct articles.
  core_contributor_label: Core Contributor
  core_empty: New core contributors will be listed here.
  contributors_label: Contributors
  contributor_label: Contributor
  contributors_title: Contributors
  contributors_desc: Anyone who has materially improved published content and is not listed as an Editor-in-Chief is listed here.
  contributors_empty: New contributors and revisions will be added here over time.
cfa_page:
  hero_label: Contribute
  hero_title: Call for articles
  hero_subtitle: What we accept, how to submit, and how editing works.
  overview_label: Overview
  overview_title: Who can submit
  overview_desc: If you have practical advice or experiences worth recording, we welcome your submission.
  guidelines_label: Guidelines
  guidelines_title: Submission guidelines
  guidelines_desc: Please note the following before submitting.
  guidelines:
    - title: Useful to readers
      description: Anything useful to UWC Changshu students is welcome. Practical guides, personal stories, reflections, tips — any format works.
    - title: Make a material contribution
      description: Each article should make a substantively new contribution. Incremental edits to existing articles are not accepted — to improve an existing article, contact the Editors-in-Chief. Well-reasoned rebuttals or alternative takes on published articles are welcome as new submissions.
    - title: Any supported language
      description: Submissions in English, Simplified Chinese, or Traditional Chinese are equally welcome.
  portal_btn: Go to Contributor Portal
  updated_label: "Updated:"
content_rights:
  label: Content Rights
  title: Code and content are licensed separately
  desc: The site's source code is open source under MIT. The original written guides, contributor photos, and other media are not.
  paragraphs:
    - Unless otherwise noted, the original guide text, editorial content, contributor portraits, profile photos, photographs, and other media published on this site are copyright their respective authors and contributors. All rights reserved.
    - Contributor portraits and profile photos are published for identification within this project only. They may not be copied, redistributed, edited, republished, or used to imply endorsement without prior written permission from the relevant rights holder and, where applicable, the depicted person.
    - You may not reproduce, redistribute, adapt, translate, or republish this material without prior written permission from the relevant copyright holder, except where applicable law independently allows it.
    - The source code and configuration used to build this site are licensed separately under the MIT License in the repository.
