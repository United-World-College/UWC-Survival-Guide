  contributors_empty: 新的贡献者和修订记录会在后续发布中加入这里。
cfa_page:
  hero_label: 征稿启事
  hero_title: 为生存指南撰稿
  hero_subtitle: 投稿指南——我们发布什么、如何提交以及编辑流程。
  overview_label: 概述
  overview_title: 我们在寻找什么
  overview_desc: 生存指南的价值取决于贡献者愿意分享的知识。如果你是 UWC 常熟的在读或往届学生，并有值得留存的实用建议，我们邀请你为本指南撰稿。
  guidelines_label: 准则
  guidelines_title: 投稿准则
  guidelines_desc: 撰写文章时请注意以下几点。
  guidelines:
    - title: 只要有帮助就行
      description: 标准很简单——只要对 UWC 常熟的同学有帮助，就适合发在这里。实用指南、个人故事、心得感悟、小贴士——任何形式都欢迎，只要别人能从中学到东西。
    - title: 要有实质性贡献
      description: 每篇文章应当贡献全新的内容，不接受对已有文章的增量补充——如果你想改进现有文章，请联系主编。但是，对已发布文章提出有理有据的反驳或不同观点非常欢迎。
    - title: 一篇一题
      description: 每篇文章应聚焦一个明确的主题。如果你发现自己在写多个话题，请考虑拆分为多篇文章。
    - title: 支持多种语言
      description: 你可以用英文、简体中文或繁体中文撰写。任何支持语言的文章都同样欢迎。
  portal_btn: 前往贡献者门户
  updated_label: 更新于：
content_rights:
  label: 内容版权
  title: 代码与内容分别授权
  desc: 网站源代码以 MIT 协议开源；原创指南文本、贡献者照片和其他媒体素材则不在此范围内。
  paragraphs:
    - 除非另有说明，本站发布的原创指南文本、编辑内容、贡献者肖像、头像照片、摄影作品及其他媒体素材的版权均归各自作者和贡献者所有，并保留所有权利。
    - 贡献者肖像和头像照片仅用于本项目内的身份识别。未经相关权利人及在适用情况下被摄者本人事先书面许可，不得复制、转载、编辑、再发布或用于暗示其认可。
    - 除非适用法律另有独立允许，未经相关版权持有人事先书面许可，不得复制、转载、改编、翻译或再发布这些内容。
    - 用于构建本站的源代码与配置文件在仓库中以 MIT 许可证单独授权。
