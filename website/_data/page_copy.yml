  about:
    hero_label: About
    hero_title: UWC Changshu China Survival Guide
    hero_subtitle: A formal introduction to the project, its editorial mission, and the students who build it.
    overview_label: Project Overview
    overview_title: A living editorial resource for the UWC Changshu China community
    overview_desc: The guide is intended to preserve practical student knowledge in a form that future cohorts can keep improving.
    introduction:
      - The UWC Changshu China Survival Guide is a student-run knowledge base for incoming and current students at UWC Changshu China.
      - It exists to preserve practical knowledge that is easy to lose between cohorts: how to settle in, how to navigate the academic system, and how to make use of the opportunities around campus and beyond.
      - The project is maintained as a living publication. Editors set direction and uphold editorial standards, while contributors write, revise, translate, and materially improve individual articles over time.
    principles:
      - title: Student-built
        description: The guide is grounded in lived student experience and focuses on what is useful in practice, not just what is formally documented.
      - title: Editorially maintained
        description: This is treated as a continuing publication with named leadership, clear attribution, and room for revision as the school environment changes.
      - title: Built to outlast a cohort
        description: The repository keeps institutional memory in one place so each graduating class can hand forward something more useful than scattered advice.
    recognition_label: Recognition Policy
    recognition_title: How contributors are recognized
    recognition_desc: Editors-in-Chief are listed separately. Core contributors are contributors who have materially contributed to five or more distinct articles. Contributors include everyone else who has written, edited, translated, or materially improved published content.
    leadership_label: Leadership
    leadership_title: Editors-in-Chief
    leadership_desc: The editors-in-chief are responsible for the editorial direction of the project and for maintaining the standard of the published guide.
    editor_in_chief_label: Editor-in-Chief
    core_label: Contributors
    core_title: Core Contributors
    core_desc: Core contributors are contributors who have materially contributed to five or more distinct articles.
    core_contributor_label: Core Contributor
    core_empty: Additional core contributors will be listed here as the project grows.
    contributors_label: Contributors
    contributors_title: Contributors
    contributors_desc: This section records everyone who has materially improved published content and is not already listed as an EDITOR-IN-CHIEF.
    contributors_empty: Additional contributors will be listed here as new articles and revisions are published.
  content_rights:
    label: Content Rights
    title: Code and content are licensed separately
    desc: The site's source code is open source under MIT. The original written guides, contributor photos, and other media are not.
    paragraphs:
      - Unless otherwise noted, the original guide text, editorial content, contributor portraits, profile photos, photographs, and other media published on this site are copyright their respective authors and contributors. All rights reserved.
      - Contributor portraits and profile photos are published for identification within this project only. They may not be copied, redistributed, edited, republished, or used to imply endorsement without prior written permission from the relevant rights holder and, where applicable, the depicted person.
      - You may not reproduce, redistribute, adapt, translate, or republish this material without prior written permission from the relevant copyright holder, except where applicable law independently allows it.
      - The source code and configuration used to build this site are licensed separately under the MIT License in the repository.
