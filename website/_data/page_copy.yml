  about:
    hero_label: 关于项目
    hero_title: UWC 常熟生存指南
    hero_subtitle: 对本项目、编辑宗旨以及参与学生的正式介绍。
    overview_label: 项目概览
    overview_title: 为 UWC 常熟社群持续维护的学生编辑资源
    overview_desc: 本指南希望把学生之间容易随届流失的实用经验沉淀下来，让后来的同学继续补充和改进。
    introduction:
      - UWC 常熟生存指南是一份由学生维护的知识库，服务于即将入学和正在就读的同学。
      - 它的目标是保存那些最容易在一届又一届之间散失的实践经验：如何安顿下来，如何适应学业体系，以及如何更好地利用校园和周边的机会。
      - 这个项目被当作一份持续更新的出版物来维护。主编负责方向与标准，贡献者则持续撰写、修订、翻译并实质性完善各篇文章。
    principles:
      - title: 学生共建
        description: 这份指南建立在真实的学生经验之上，关注的是在实际生活里真正有用的信息，而不只是正式文件上的内容。
      - title: 编辑维护
        description: 我们把它当作一份长期更新的出版物来对待，拥有明确署名、清晰标准，以及随着学校环境变化持续修订的空间。
      - title: 超越一届
        description: 仓库把学校的集体记忆集中保存下来，让每一届毕业生都能把更有用的经验交给下一届，而不是留下零散建议。
    recognition_label: 署名规则
    recognition_title: 贡献者如何被标注
    recognition_desc: 主编单独列出。核心贡献者指对五篇或以上不同文章做出实质性贡献的成员。其他所有撰写、编辑、翻译或实质性改进已发布内容的人都会列为贡献者。
    cfa_label: 征稿启事
    cfa_title: 我们正在寻找贡献者
    cfa_desc: 生存指南的价值取决于贡献者愿意分享的知识。如果你是 UWC 常熟的在读或往届学生，并有值得留存的实用建议，我们邀请你为本指南撰稿。
