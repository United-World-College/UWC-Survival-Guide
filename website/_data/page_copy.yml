    overview_desc: 生存指南的價值取決於貢獻者願意分享的知識。如果你是 UWC 常熟的在讀或往屆學生，並有值得留存的實用建議，我們邀請你為本指南撰稿。
    guidelines_label: 準則
    guidelines_title: 投稿準則
    guidelines_desc: 撰寫文章時請注意以下幾點。
    guidelines:
      - title: 只要有幫助就行
        description: 標準很簡單——只要對 UWC 常熟的同學有幫助，就適合發在這裡。實用指南、個人故事、心得感悟、小貼士——任何形式都歡迎，只要別人能從中學到東西。
      - title: 要有實質性貢獻
        description: 每篇文章應當貢獻全新的內容，不接受對已有文章的增量補充——如果你想改進現有文章，請聯繫主編。但是，對已發布文章提出有理有據的反駁或不同觀點非常歡迎。
      - title: 一篇一題
        description: 每篇文章應聚焦一個明確的主題。如果你發現自己在寫多個話題，請考慮拆分為多篇文章。
      - title: 支援多種語言
        description: 你可以用英文、簡體中文或繁體中文撰寫。任何支援語言的文章都同樣歡迎。
    portal_btn: 前往貢獻者門戶
