    full_guide_title: 浏览全部主题
    full_guide_desc: 每篇指南都由学生撰写并持续维护。先按语言浏览，再打开你需要的主题。
    contribute_label: 共同建设
    contribute_title: 这份指南会和我们一起成长
    contribute_desc: 每一条建议、修正和经验，都会让下一位来到这里的同学少走一些弯路。
