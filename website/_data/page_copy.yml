    contribute_title: 这份指南会和我们一起成长
    contribute_desc: 每一条建议、修正和经验，都会让下一位来到这里的同学少走一些弯路。
    steps:
      - Fork 仓库
      - 添加或更新内容
      - 提交 Pull Request
  about:
    hero_label: 关于项目
    hero_title: UWC 常熟生存指南
    hero_subtitle: 对本项目、编辑宗旨以及参与学生的正式介绍。
    overview_label: 项目概览
    overview_title: 为 UWC 常熟社群持续维护的学生编辑资源
    overview_desc: 本指南希望把学生之间容易随届流失的实用经验沉淀下来，让后来的同学继续补充和改进。
    introduction:
      - UWC 常熟生存指南是一份由学生维护的知识库，服务于即将入学和正在就读的同学。
      - 它的目标是保存那些最容易在一届又一届之间散失的实践经验：如何安顿下来，如何适应学业体系，以及如何更好地利用校园和周边的机会。
      - 这个项目被当作一份持续更新的出版物来维护。主编负责方向与标准，贡献者则持续撰写、修订、翻译并实质性完善各篇文章。
    principles:
      - title: 学生共建
        description: 这份指南建立在真实的学生经验之上，关注的是在实际生活里真正有用的信息，而不只是正式文件上的内容。
      - title: 编辑维护
        description: 我们把它当作一份长期更新的出版物来对待，拥有明确署名、清晰标准，以及随着学校环境变化持续修订的空间。
      - title: 超越一届
        description: 仓库把学校的集体记忆集中保存下来，让每一届毕业生都能把更有用的经验交给下一届，而不是留下零散建议。
    recognition_label: 署名规则
    recognition_title: 贡献者如何被标注
    recognition_desc: 主编单独列出。核心贡献者指对五篇或以上不同文章做出实质性贡献的成员。其他所有撰写、编辑、翻译或实质性改进已发布内容的人都会列为贡献者。
    leadership_label: 项目团队
    leadership_title: 主编
    leadership_desc: 主编负责项目的编辑方向，并维护已发布指南的整体标准。
    editor_in_chief_label: 主编
    core_label: 贡献者
    core_title: 核心贡献者
    core_desc: 核心贡献者指对五篇或以上不同文章做出实质性贡献的成员。
    core_contributor_label: 核心贡献者
    core_empty: 随着项目发展，新的核心贡献者会列在这里。
    contributors_label: 贡献者
    contributors_title: 其他贡献者
    contributors_desc: 本部分记录所有对已发布内容做出实质性改进且未被列为主编的成员。
    contributors_empty: 新的贡献者和修订记录会在后续发布中加入这里。
  content_rights:
    label: 内容版权
    title: 代码与内容分别授权
    desc: 网站源代码以 MIT 协议开源；原创指南文本、贡献者照片和其他媒体素材则不在此范围内。
    paragraphs:
      - 除非另有说明，本站发布的原创指南文本、编辑内容、贡献者肖像、头像照片、摄影作品及其他媒体素材的版权均归各自作者和贡献者所有，并保留所有权利。
      - 贡献者肖像和头像照片仅用于本项目内的身份识别。未经相关权利人及在适用情况下被摄者本人事先书面许可，不得复制、转载、编辑、再发布或用于暗示其认可。
      - 除非适用法律另有独立允许，未经相关版权持有人事先书面许可，不得复制、转载、改编、翻译或再发布这些内容。
      - 用于构建本站的源代码与配置文件在仓库中以 MIT 许可证单独授权。
  section:
    article_singular: 篇文章
    article_plural: 篇文章
