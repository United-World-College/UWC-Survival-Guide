      - 除非另有說明，本站發布的原創指南文字、編輯內容、貢獻者肖像、頭像照片、攝影作品及其他媒體素材的版權均歸各自作者和貢獻者所有，並保留所有權利。
      - 貢獻者肖像和頭像照片僅用於本計畫內的身分識別。未經相關權利人及在適用情況下被攝者本人事先書面許可，不得複製、轉載、編輯、再發布或用於暗示其認可。
