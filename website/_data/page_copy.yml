    hero_title_line_one: UWC Changshu China
    hero_title_line_two: 生存指南
    hero_subtitle: 一份由学生共同编写的指南，帮你在这里生活、学习，并找到自己的方向。
    hero_cta: 开始探索
    experiences_label: 校园生活
    experiences_title: 每一天都从这里开始
    experiences_desc: 从湖边安静的清晨，到公共休息室里的深夜长谈，校园生活塑造了你在 UWC 的每一天。
    essentials_label: 初来乍到
    essentials_title: 必备信息，一目了然
    essentials_desc: 让日常生活更顺畅的实用细节，从支付到交通，都集中在这里。
    explore_label: 走出校园
    explore_title: 附近有很多值得去的地方
    explore_desc: 常熟只是起点。苏州、上海，以及江南水乡都在可到达的范围内。
    full_guide_label: 完整指南
    full_guide_title: 浏览全部主题
    full_guide_desc: 每篇指南都由学生撰写并持续维护。先按语言浏览，再打开你需要的主题。
